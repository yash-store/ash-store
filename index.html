<!DOCTYPE html>
<html>

<head>
    <title>Yash Clothing 🔥</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Yash Clothing 🔥</h1>

<div class="container">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
        <h3>Black T-Shirt</h3>
        <p>₹499</p>
        <button onclick="addToCart('Black T-Shirt',499)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
        <h3>White T-Shirt</h3>
        <p>₹399</p>
        <button onclick="addToCart('White T-Shirt',350)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a">
        <h3>Red T-Shirt</h3>
        <p>₹599</p>
        <button onclick="addToCart('Red T-Shirt',420)">Add to Cart</button>
    </div>
<button onclick="orderNow()">Order on WhatsApp 📲</button>
</div>

<div class="cart">
    <h2>🛒 Cart</h2>
    <p id="items">No items</p>
    <h3>Total: ₹<span id="total">0</span></h3>
</div>
alert("JS Connected");

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push(name);
    total += price;

    document.getElementById("items").innerText = cart.join(", ");
    document.getElementById("total").innerText = total;
}
</script>
</body>

<script>
function orderNow() {
    let items = document.getElementById("items").innerText;
    let total = document.getElementById("total").innerText;

    let message = "Order: " + items + " | Total ₹" + total;

    let phone = "7985523701"; // apna number daal

    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>
